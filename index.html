<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Cars</title>

<style>

body {
    margin: 0;
    background-color: #1c1515;
    color: white;
    font-family: Arial, sans-serif;
    padding-bottom: 60px;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 15px 30px;
    background: #eb7773;
    gap: 20px;
}

.title {
    font-family: 'Anton', sans-serif;
    font-size: 50px;
    margin: 0;
    
}

/* MAIN HEADING */
.f1-heading {
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    font-size: 40px;
    margin: 20px 0;
}

/* GRID 2 COLUMNS */
.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
}

/* BASE BOX */
.car-box {
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    transition: 0.3s;
}

.car-box:hover {
    transform: scale(1.03);
}

/* CAR IMAGE */
.car-box img {
    width: 100%;
    height: 150px;
    object-fit: contain;
}

/* TEAM COLORS */
.mercedes { background: #00D2BE; color: black; }
.ferrari  { background: #DC0000; }
.mclaren  { background: #FF8700; color: black; }
.redbull  { background: #0600EF; }
.alpine   { background: #0090FF; }
.haas     { background: #ffffff; color: black; }
.audi     { background: #BFBFBF; color: black; }
.williams { background: #005AFF; }
.cadillac { background: #0f0f0f; border: 1px solid #555; }
.aston    { background: #006F62; }

.f1-title {
    font-size: 20px;
    font-weight: bold;
}

.drivers span {
    display: block;
    font-size: 14px;
}

/* RESPONSIVE */
@media (max-width: 700px) {
    .container {
        grid-template-columns: 1fr;
    }
}

footer {
    text-align: center;
    padding: 10px;
    background: #222;
    position: fixed;
    bottom: 0;
    width: 100%;
}

</style>
</head>

<body>

<header class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/33/F1.svg" width="80">
    <h1 class="title">F1 CARS</h1>
</header>

<h1 class="f1-heading">F1 Teams 2026</h1>

<div class="container">

<div class="car-box mercedes">
<img src="https://media.formula1.com/image/upload/c_lfill,w_3392/q_auto/v1740000001/common/f1/2026/mercedes/2026mercedescarright.webp">
<h3 class="f1-title">Mercedes</h3>
</div>

<div class="car-box ferrari">
<img src="https://media.formula1.com/image/upload/c_lfill,w_3392/q_auto/v1740000001/common/f1/2026/ferrari/2026ferraricarright.webp">
<h3 class="f1-title">Ferrari</h3>
</div>

<div class="car-box mclaren">
<img src="https://media.formula1.com/image/upload/c_lfill,w_3392/q_auto/v1740000001/common/f1/2026/mclaren/2026mclarencarright.webp">
<h3 class="f1-title">McLaren</h3>
</div>

<div class="car-box redbull">
<img src="https://media.formula1.com/image/upload/c_lfill,w_3392/q_auto/v1740000001/common/f1/2026/redbullracing/2026redbullracingcarright.webp">
<h3 class="f1-title">Red Bull</h3>
</div>

<div class="car-box alpine">
<img src="https://media.formula1.com/image/upload/c_lfill,w_3392/q_auto/v1740000001/common/f1/2026/alpine/2026alpinecarright.webp">
<h3 class="f1-title">Alpine</h3>
</div>

<div class="car-box haas">
<img src="https://media.formula1.com/image/upload/c_lfill,w_3392/q_auto/v1740000001/common/f1/2026/haas/2026haascarright.webp">
<h3 class="f1-title">Haas</h3>
</div>

<div class="car-box audi">

<div class="car-box williams">

</body>
</html>
