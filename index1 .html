<title>F1 Cars</title>

<style>
body {
    font-family:'LuciSans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif, sans-serif;
    margin: 0;
    background-color: #0b0b0b;
    color: #ffffff;
    padding-bottom: 60px;
}
.title {
    font-family: 'Anton', sans-serif;
    font-size: 50px;
    color: white;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-align: center;
}


.header {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 15px 30px;
    background: #e10600;
    color: white;
    gap: 15px;
}
.f1-heading {
    font-family: 'Orbitron', sans-serif;
    font-size: 48px;
    font-weight: 900;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 5px;
    color: #ffffff;
    margin: 30px 0;
    text-shadow: 0 0 10px rgba(225, 6, 0, 0.3);
}
.logo {
    height: 40px;
    width: auto;
    left: auto;
}

nav {
    background: #ebe5e5;
    padding: 10px;
    text-align: center;
}

nav a {
    color: black;
    margin: 0 10px;
    text-decoration: none;
}

nav a:hover {
    color: gray;
}

/* ✅ FIXED: container now works */
.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.car-box {
    background: #1f1f1f;
    border: 1px solid #e10600;
    padding: 20px;
    color: white;
    text-align: center;
}
.car-box img {
    width: 100%;
    height: 150px;
    object-fit: contain;
}

.f1-title {
    font-size: 20px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
    color: #ffffff;
}

.f1-title:hover {
    color: #e10600;
    text-shadow: 0 0 10px #e10600;
    transition: 0.3s;
}

.drivers {
    margin-top: 10px;
}

.drivers span {
    display: block;
    font-size: 16px;
    color: #cccccc;
}

.drivers span:hover {
    color: #e10600;
    text-shadow: 0 0 10px #e10600;
    transition: 0.3s;
}
@media (max-width: 700px) {
    .container {
        grid-template-columns: 1fr;
    }
}
footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 10px;
    position: fixed;
    bottom: 0;
    width: 100%;
}
</style>
